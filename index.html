<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>汪沄的个人主页</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero card reveal">
        <div class="hero-layout">
          <div class="avatar-wrap" id="avatar-wrap">
            <img id="avatar" src="avatar.jpg" alt="汪沄头像" class="avatar" />
          </div>
          <div class="hero-copy">
            <div class="hero-top">
              <p class="tag">个人主页</p>
            </div>
            <h1 id="hero-title">你好，我是汪沄</h1>
            <p class="subtitle" id="hero-subtitle">英语语言学专业学生。</p>
            <div class="chip-row">
              <span class="chip" id="chip-major">专业：英语语言学</span>
              <span class="chip" id="chip-hobby">爱好：游泳</span>
              <span class="chip">MacBook Air M5</span>
            </div>
          </div>
        </div>
      </section>

      <section class="grid">
        <article class="card reveal">
          <h2 id="contact-title">联系方式</h2>
          <p>
            <a href="mailto:lucasywh@sjtu.edu.cn" id="contact-link">lucasywh@sjtu.edu.cn</a>
          </p>
        </article>
        <article class="card reveal">
          <h2>文章</h2>
          <ul id="post-list"></ul>
        </article>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
